<section class="connect">
  <div class="container connect__container">
    <div class="connect__content">
      <div class="connect__hgroup hgroup">
        <h2 class="connect__hgroup-title" data-i18n="conn-title">
          NEWSLETTER SUBSCRIBE
        </h2>
        <p class="connect__hgroup-subtitle subtitle" data-i18n="conn-subtitle">
          Want to stay in touch?
        </p>
      </div>
      <p class="connect__content-text" data-i18n="conn-text">
        In order to start receiving our news, all you have to do is enter your
        email address. Everything else will be taken care of by us. We will send
        you emails containing information about game. We don’t spam.
      </p>

      <form class="connect__form" action="get">
        <input
          class="connect__form-field"
          type="email"
          name="email"
          id="email"
          placeholder="your Email adress"
          required
        />

        <button
          class="connect__form-btn btn"
          type="submit"
          data-i18n="conn-btn"
        >
          Subscribe now
        </button>
      </form>
    </div>
  </div>
</section>
